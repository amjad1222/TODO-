<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="container w-25 border-3 border border-black rounded-4 p-3">
      <img src="1.jfif" class="img-thumbnail w-100" alt="" />

      <h2 class="fw-semibold mt-3">Sign in</h2>

      <div class="form-floating mb-3">
        <input
          type="email"
          class="form-control"
          id="floatingInput"
          placeholder="name@example.com"
        />
        <label for="floatingInput">Email address</label>
      </div>

      <div class="form-floating">
        <input
          type="password"
          class="form-control"
          id="floatingPassword"
          placeholder="Password"
        />
        <label for="floatingPassword">Password</label>
      </div>

      <br />

      <div class="d-flex justify-content-center">
        <a href="task.html" class="btn btn-warning w-100">Sign in</a>
      </div>

      <br />

      <p class="text-center">OR</p>

      <div class="d-flex justify-content-evenly">
        <button type="button" class="btn btn-warning btn-lg">Google</button>

        <button
          type="button"
          class="btn btn-secondary btn-lg"
          style="background-color: blue"
        >
          FaceBook
        </button>
      </div>

      <br />

      <div class="d-flex justify-content-evenly">
        Already have an account?
        <button type="button" class="btn btn-warning">Sign up</button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
